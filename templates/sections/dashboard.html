<!-- templates/sections/dashboard.html ফাইলটি সম্পূর্ণ প্রতিস্থাপন করুন -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <!-- Card 1: Total Targets -->
    <div class="bg-[#1B1E31]/40 border border-white/5 p-5 rounded-[2rem] text-center shadow-lg relative overflow-hidden glass-card">
        <i class="fas fa-crosshairs absolute right-[-10px] bottom-[-10px] text-7xl text-white/3"></i>
        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1.5 relative z-10">Total Targets</p>
        <h2 id="total-targets" class="text-3xl font-black text-indigo-400 relative z-10 drop-shadow-[0_0_10px_rgba(99,102,241,0.3)]">0</h2>
    </div>
    <!-- Card 2: Active Attacker Bots -->
    <div class="bg-[#1B1E31]/40 border border-white/5 p-5 rounded-[2rem] text-center shadow-lg relative overflow-hidden glass-card">
        <i class="fas fa-bolt absolute right-[-10px] bottom-[-10px] text-7xl text-white/3"></i>
        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1.5 relative z-10">Attacker Bots</p>
        <h2 id="total-bots" class="text-3xl font-black text-fuchsia-400 relative z-10 drop-shadow-[0_0_10px_rgba(217,70,239,0.3)]">0</h2>
    </div>
    <!-- Card 3: Active Tracker Bots (🚀 NEW CARD) -->
    <div class="bg-[#1B1E31]/40 border border-white/5 p-5 rounded-[2rem] text-center shadow-lg relative overflow-hidden glass-card">
        <i class="fas fa-search absolute right-[-10px] bottom-[-10px] text-7xl text-white/3"></i>
        <p class="text-gray-400 text-xs font-black uppercase tracking-widest mb-1.5 relative z-10">Tracker Bots</p>
        <h2 id="total-check-bots" class="text-3xl font-black text-cyan-400 relative z-10 drop-shadow-[0_0_10px_rgba(34,211,238,0.3)]">0</h2>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Button 1: Active Bots Console -->
    <button onclick="openConsoleModal()" class="w-full bg-[#1B1E31]/30 border border-white/5 hover:border-indigo-500/30 hover:bg-indigo-500/10 p-4 rounded-[1.8rem] flex items-center justify-between text-xs font-black uppercase tracking-widest text-indigo-400 shadow-lg hover:shadow-indigo-500/5 transition duration-300 relative group overflow-hidden">
        <div class="flex items-center gap-3 relative z-10">
            <i class="fas fa-terminal animate-pulse"></i>
            <span>Monitor Attacker Bots Console</span>
        </div>
        <div class="flex items-center gap-1.5 relative z-10">
            <span class="text-[10px] text-gray-500 font-bold uppercase mr-1">View Logs</span>
            <i class="fas fa-chevron-right transition-transform group-hover:translate-x-1"></i>
        </div>
    </button>

    <!-- Button 2: Check Bots Console (🚀 NEW BUTTON) -->
    <button onclick="openCheckConsoleModal()" class="w-full bg-[#1B1E31]/30 border border-white/5 hover:border-cyan-500/30 hover:bg-cyan-500/10 p-4 rounded-[1.8rem] flex items-center justify-between text-xs font-black uppercase tracking-widest text-cyan-400 shadow-lg hover:shadow-cyan-500/5 transition duration-300 relative group overflow-hidden">
        <div class="flex items-center gap-3 relative z-10">
            <i class="fas fa-terminal animate-pulse"></i>
            <span>Monitor Tracker Bots Console</span>
        </div>
        <div class="flex items-center gap-1.5 relative z-10">
            <span class="text-[10px] text-gray-500 font-bold uppercase mr-1">View Logs</span>
            <i class="fas fa-chevron-right transition-transform group-hover:translate-x-1"></i>
        </div>
    </button>
</div>

<script>
    window.safeRunSection('dashboard', function() {
        window.fetchDashboard = async function() {
            try {
                let res = await fetch('/api/dashboard'); 
                if (res.status === 401) { 
                    window.location.reload(); 
                    return; 
                }
                let data = await res.json();
                
                document.getElementById('total-targets').innerText = data.total_targets || 0;
                document.getElementById('total-bots').innerText = data.total_bots || 0;
                document.getElementById('total-check-bots').innerText = data.total_check_bots || 0; // 🚀 ট্র্যাকার বটের মোট সংখ্যা লোড
                
                if(document.getElementById('p-usage')) {
                    document.getElementById('p-usage').innerText = data.user_usage;
                }
                if(document.getElementById('header-added-limit')) {
                    document.getElementById('header-added-limit').innerText = data.user_usage;
                }

                // ১. Attacker Console Render
                if (window.consoleModalOpen) {
                    let consoleHtml = '';
                    (data.bots || []).forEach(b => {
                        let sColor = b.status.toLowerCase().includes('online') || b.status.toLowerCase().includes('ready') ? 'text-emerald-400' : 'text-rose-500';
                        consoleHtml += `<div class="py-2 border-b border-white/5 flex flex-wrap items-center justify-between text-xs"><span class="text-gray-500 font-bold">Bot ${b.no} :</span> <span class="text-white font-bold">${b.name}</span> <span class="font-mono text-gray-500">UID ${b.uid}</span> <span class="${sColor} font-black uppercase tracking-wider">${b.status}</span></div>`;
                    });
                    
                    const consoleBox = document.getElementById('console-box');
                    if (consoleBox) {
                        consoleBox.innerHTML = consoleHtml || '<div class="text-gray-600 p-4">No bots online.</div>';
                    }
                }

                // ২. Tracker Console Render (🚀 NEW LIVE PARSER)
                if (window.checkConsoleModalOpen) {
                    let checkConsoleHtml = '';
                    (data.check_bots || []).forEach(b => {
                        let sColor = b.status.toLowerCase().includes('connected') || b.status.toLowerCase().includes('listening') ? 'text-emerald-400' : 'text-rose-500';
                        checkConsoleHtml += `<div class="py-2 border-b border-white/5 flex flex-wrap items-center justify-between text-xs"><span class="text-gray-500 font-bold">Bot ${b.no} :</span> <span class="text-white font-bold">${b.name}</span> <span class="font-mono text-gray-500">UID ${b.uid}</span> <span class="${sColor} font-black uppercase tracking-wider">${b.status}</span></div>`;
                    });
                    
                    const checkConsoleBox = document.getElementById('check-console-body');
                    if (checkConsoleBox) {
                        checkConsoleBox.innerHTML = checkConsoleHtml || '<div class="text-gray-600 p-4">No tracker bots online.</div>';
                    }
                }
            } catch(e) {
                console.error("Dashboard poll failed:", e);
            }
        };

        window.addEventListener('tabSwitched', function(e) {
            if (e.detail.tab === 'dashboard') {
                fetchDashboard();
            }
        });

        fetchDashboard();
        setInterval(fetchDashboard, 5000);
    });
</script>
